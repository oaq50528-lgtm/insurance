<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>產險客戶管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8;--paper:#fefcf7;--ink:#1a1208;--ink2:#5a4a32;--ink3:#9a8a72;
  --gold:#c8962a;--gold2:#e8b84b;--red:#c0392b;--orange:#d35400;--green:#27ae60;
  --border:#d4c4a0;
}
body{background:var(--bg);font-family:'Noto Serif TC',serif;min-height:100vh}
.app{max-width:860px;margin:0 auto;padding-bottom:60px}

/* TOAST */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--gold2);padding:10px 22px;font-size:14px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);border-radius:2px;pointer-events:none;opacity:0;transition:opacity .2s}
.toast.show{opacity:1}

/* HEADER */
.header{background:var(--ink);color:var(--gold2);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--gold)}
.hl{display:flex;align-items:center;gap:10px;min-width:0}
.logo{font-size:22px;flex-shrink:0}
.htitle{font-size:16px;font-weight:700;letter-spacing:1px}
.hr{display:flex;gap:8px;flex-shrink:0}
.btn{border:none;cursor:pointer;padding:9px 16px;font-family:'Noto Serif TC',serif;font-size:14px;font-weight:600;letter-spacing:1px;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--gold);color:var(--ink)}.btn-primary:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--gold2);border:1.5px solid #4a3a1a}.btn-ghost:hover{border-color:var(--gold2)}

/* BACKUP */
.backup-bar{background:#fffbef;border-bottom:2px solid #e8d080;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.backup-title{font-size:14px;font-weight:700;color:var(--ink)}
.backup-btns{display:flex;gap:8px;flex-wrap:wrap}
.bbtn{background:var(--ink);color:var(--gold2);border:none;cursor:pointer;padding:10px 14px;font-family:'Noto Serif TC',serif;font-size:13px;font-weight:600;transition:all .2s;flex:1;min-width:120px;text-align:center}.bbtn:hover{background:#2d2010}
.bbtn-alt{background:none;border:2px solid var(--ink);color:var(--ink)}.bbtn-alt:hover{background:var(--ink);color:var(--gold2)}
.backup-hint{font-size:12px;color:var(--ink3);line-height:1.6}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.sc{background:var(--paper);padding:12px 8px;text-align:center;cursor:pointer;transition:background .15s}.sc:hover{background:#fdf8ef}
.sn{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--ink)}
.sn-red{color:var(--red)}.sn-orange{color:var(--orange)}.sn-muted{color:var(--ink3)}
.sl{font-size:10px;color:var(--ink3);margin-top:2px;letter-spacing:.5px}

/* TOOLBAR */
.toolbar{padding:12px 16px;background:var(--paper);border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search{flex:1;min-width:120px;padding:8px 11px;border:1.5px solid var(--border);background:var(--bg);font-family:'Noto Serif TC',serif;font-size:14px;color:var(--ink);outline:none}.search:focus{border-color:var(--gold)}
.sel{padding:8px 8px;border:1.5px solid var(--border);background:var(--bg);font-family:'Noto Serif TC',serif;font-size:13px;color:var(--ink);outline:none;cursor:pointer}.sel:focus{border-color:var(--gold)}

/* TABS */
.tabs{display:flex;background:var(--bg);border-bottom:2px solid var(--border);padding:0 16px}
.tab{padding:10px 14px;border:none;background:none;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:13px;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);font-weight:600}

/* LIST */
.list{padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.empty{text-align:center;padding:60px 20px;color:var(--ink3);font-size:15px;line-height:2}
.row{background:var(--paper);border:1px solid var(--border);border-left:3px solid transparent;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s}
.row:hover{border-color:var(--gold);transform:translateX(2px)}
.row-er{border-left-color:var(--red)}.row-ur{border-left-color:var(--orange)}.row-so{border-left-color:var(--gold)}
.av{width:38px;height:38px;background:var(--ink);color:var(--gold2);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;border-radius:2px}
.rm{flex:1;min-width:0}
.rn{font-size:14px;font-weight:600;color:var(--ink)}
.rmeta{font-size:11px;color:var(--ink3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.rr{text-align:right;flex-shrink:0}
.rtype{font-size:11px;color:var(--ink3);margin-bottom:4px}
.rdate{font-size:10px;color:var(--ink3);margin-top:3px;font-family:'JetBrains Mono',monospace}

/* BADGE */
.badge{display:inline-block;padding:2px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:600}
.badge-ex{background:var(--red);color:#fff}.badge-ur{background:var(--orange);color:#fff}
.badge-so{background:var(--gold);color:var(--ink)}.badge-ok{background:#e8f5e9;color:var(--green);border:1px solid var(--green)}

/* PANEL */
.panel{background:var(--paper);margin:16px;border:1px solid var(--border);box-shadow:4px 4px 0 var(--border)}
.phd{background:var(--ink);color:var(--gold2);padding:13px 16px}
.ptitle{font-size:15px;font-weight:700;letter-spacing:2px}
.pb{padding:18px 16px}

/* FORM */
.sec{margin-bottom:20px}
.sec-title{font-size:10px;letter-spacing:3px;color:var(--ink3);border-bottom:1px solid var(--border);padding-bottom:7px;margin-bottom:14px;text-transform:uppercase}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fld{display:flex;flex-direction:column;gap:4px}.fw{grid-column:1/-1}
.fld label{font-size:11px;color:var(--ink3);letter-spacing:1px}
.fld input,.fld select,.fld textarea{padding:9px 11px;border:1.5px solid var(--border);background:var(--bg);font-family:'Noto Serif TC',serif;font-size:15px;color:var(--ink);outline:none;transition:border-color .15s;width:100%;-webkit-appearance:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold)}
.fld textarea{resize:vertical;min-height:72px}
.faction{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-save{background:var(--gold);color:var(--ink);border:none;cursor:pointer;padding:12px 28px;font-family:'Noto Serif TC',serif;font-size:15px;font-weight:600;letter-spacing:1px;transition:all .2s}.btn-save:hover{background:var(--gold2)}
.btn-cancel{background:none;border:1.5px solid var(--border);color:var(--ink2);cursor:pointer;padding:12px 20px;font-family:'Noto Serif TC',serif;font-size:15px;transition:all .15s}.btn-cancel:hover{border-color:var(--ink2)}

/* ALERTS */
.alert{padding:12px 14px;margin-bottom:16px;font-size:14px;font-weight:600;line-height:1.5}
.alert-red{background:#fdf0ee;border-left:4px solid var(--red);color:var(--red)}
.alert-orange{background:#fef5ec;border-left:4px solid var(--orange);color:var(--orange)}
.alert-gold{background:#fdf8ef;border-left:4px solid var(--gold);color:#8a6010}

/* DETAIL */
.dhero{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.dav{width:50px;height:50px;background:var(--ink);color:var(--gold2);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;border-radius:2px;flex-shrink:0}
.dname{font-size:19px;font-weight:700;color:var(--ink)}.dtype{font-size:12px;color:var(--ink3);margin-top:3px}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.dlabel{font-size:10px;letter-spacing:2px;color:var(--ink3);margin-bottom:3px;text-transform:uppercase}
.dval{font-size:13px;color:var(--ink);font-family:'JetBrains Mono',monospace;word-break:break-all}
.dcov{font-size:13px;line-height:1.8;background:var(--bg);padding:10px 12px;border-left:3px solid var(--gold);font-family:'Noto Serif TC',serif;margin-bottom:14px}
.dnote{font-size:13px;line-height:1.8;color:var(--ink2);font-family:'Noto Serif TC',serif}
.dactions{display:flex;gap:10px;margin-top:20px;border-top:1px solid var(--border);padding-top:16px}
.btn-edit{background:var(--ink);color:var(--gold2);border:none;cursor:pointer;padding:10px 22px;font-family:'Noto Serif TC',serif;font-size:14px;font-weight:600;transition:all .15s}.btn-edit:hover{background:#2d2010}
.btn-del{background:none;border:1.5px solid var(--red);color:var(--red);cursor:pointer;padding:10px 16px;font-family:'Noto Serif TC',serif;font-size:14px;transition:all .15s}.btn-del:hover{background:var(--red);color:#fff}

/* HIDDEN */
.hidden{display:none!important}

@media(max-width:500px){
  .fg,.dgrid{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .panel{margin:10px}
  .backup-btns{flex-direction:column}
  .bbtn{min-width:unset}
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="hl">
      <span class="logo">🛡️</span>
      <div class="htitle">產險客戶管理</div>
    </div>
    <div class="hr" id="header-actions"></div>
  </div>

  <!-- LIST VIEW -->
  <div id="view-list">
    <!-- BACKUP BAR -->
    <div class="backup-bar">
      <div class="backup-title">📦 備份 / 還原資料</div>
      <div class="backup-btns">
        <button class="bbtn" onclick="exportJSON()">⬇ 匯出 JSON 備份</button>
        <button class="bbtn" onclick="exportCSV()">⬇ 匯出 CSV</button>
        <button class="bbtn bbtn-alt" onclick="document.getElementById('file-input').click()">⬆ 還原備份</button>
      </div>
      <div class="backup-hint">💡 定期匯出備份，存到手機或 Google 雲端，換裝置時用「還原備份」重新匯入</div>
    </div>
    <input type="file" id="file-input" accept=".json" class="hidden" onchange="importJSON(event)">

    <!-- STATS -->
    <div class="stats">
      <div class="sc"><div class="sn" id="stat-total">0</div><div class="sl">總客戶數</div></div>
      <div class="sc" onclick="setTab('urgent')"><div class="sn sn-red" id="stat-urgent">0</div><div class="sl">30天內到期</div></div>
      <div class="sc" onclick="setTab('urgent')"><div class="sn sn-orange" id="stat-soon">0</div><div class="sl">60天內到期</div></div>
      <div class="sc" onclick="setTab('expired')"><div class="sn sn-muted" id="stat-expired">0</div><div class="sl">已過期</div></div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <input class="search" id="search-input" placeholder="搜尋姓名、電話、保單號碼…" oninput="renderList()">
      <select class="sel" id="type-filter" onchange="renderList()">
        <option>全部</option>
        <option>汽車險</option><option>機車險</option><option>火災險</option>
        <option>旅遊平安險</option><option>傷害險</option><option>住宅險</option>
        <option>責任險</option><option>其他</option>
      </select>
      <select class="sel" id="sort-by" onchange="renderList()">
        <option value="endDate">依到期日</option>
        <option value="name">依姓名</option>
      </select>
    </div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab on" id="tab-all" onclick="setTab('all')">全部客戶</button>
      <button class="tab" id="tab-urgent" onclick="setTab('urgent')">即將到期</button>
      <button class="tab" id="tab-expired" onclick="setTab('expired')">已過期</button>
    </div>

    <!-- CLIENT LIST -->
    <div class="list" id="client-list"></div>
  </div>

  <!-- FORM VIEW -->
  <div id="view-form" class="hidden">
    <div class="panel">
      <div class="phd"><div class="ptitle" id="form-title">新增客戶資料</div></div>
      <div class="pb">
        <div class="sec">
          <div class="sec-title">客戶基本資料</div>
          <div class="fg">
            <div class="fld"><label>姓名 *</label><input id="f-name" placeholder="王小明"></div>
            <div class="fld"><label>電話</label><input id="f-phone" placeholder="0912-345-678" type="tel"></div>
            <div class="fld"><label>身份證字號</label><input id="f-idNo" placeholder="A123456789"></div>
            <div class="fld"><label>電子信箱</label><input id="f-email" placeholder="client@email.com" type="email"></div>
            <div class="fld fw"><label>通訊地址</label><input id="f-address" placeholder="台南市中西區…"></div>
          </div>
        </div>
        <div class="sec">
          <div class="sec-title">保險資料</div>
          <div class="fg">
            <div class="fld"><label>險種 *</label>
              <select id="f-insType">
                <option>汽車險</option><option>機車險</option><option>火災險</option>
                <option>旅遊平安險</option><option>傷害險</option><option>住宅險</option>
                <option>責任險</option><option>其他</option>
              </select>
            </div>
            <div class="fld"><label>保險公司</label><input id="f-insCompany" placeholder="富邦產險"></div>
            <div class="fld"><label>保單號碼</label><input id="f-policyNo" placeholder="PA2024001234"></div>
            <div class="fld"><label>年度保費（元）</label><input id="f-premium" placeholder="12000" type="number"></div>
            <div class="fld"><label>生效日期</label><input id="f-startDate" type="date"></div>
            <div class="fld"><label>到期日期 *</label><input id="f-endDate" type="date"></div>
          </div>
        </div>
        <div class="sec">
          <div class="sec-title">保障內容 / 備註</div>
          <div class="fld" style="margin-bottom:12px"><label>保障內容摘要</label><textarea id="f-coverage" placeholder="例：車體損失險（甲式）、第三人責任險 300萬…"></textarea></div>
          <div class="fld"><label>備註</label><textarea id="f-note" placeholder="特殊注意事項…"></textarea></div>
        </div>
        <div class="faction">
          <button class="btn-cancel" onclick="showView('list')">取消</button>
          <button class="btn-save" onclick="saveForm()">儲存資料</button>
        </div>
      </div>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div id="view-detail" class="hidden">
    <div class="panel">
      <div class="phd"><div class="ptitle">客戶詳情</div></div>
      <div class="pb" id="detail-body"></div>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = 'ins_clients_v4';
let clients = [];
let currentTab = 'all';
let editingId = null;

// ── Storage ──────────────────────────────────────────────────────
function loadData() {
  try { clients = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { clients = []; }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(clients));
}

// ── Utils ─────────────────────────────────────────────────────────
function daysDiff(d) {
  if (!d) return null;
  const t = new Date(); t.setHours(0,0,0,0);
  const e = new Date(d); e.setHours(0,0,0,0);
  return Math.ceil((e-t)/86400000);
}
function badge(days) {
  if (days === null) return '';
  if (days < 0)   return `<span class="badge badge-ex">已過期</span>`;
  if (days <= 30)  return `<span class="badge badge-ur">剩 ${days} 天</span>`;
  if (days <= 60)  return `<span class="badge badge-so">剩 ${days} 天</span>`;
  return `<span class="badge badge-ok">剩 ${days} 天</span>`;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── View switching ────────────────────────────────────────────────
function showView(v) {
  ['list','form','detail'].forEach(x => {
    document.getElementById('view-'+x).classList.toggle('hidden', x !== v);
  });
  // header buttons
  const ha = document.getElementById('header-actions');
  if (v === 'list') {
    ha.innerHTML = `<button class="btn btn-primary" onclick="openNew()">＋ 新增客戶</button>`;
  } else {
    ha.innerHTML = `<button class="btn btn-ghost" onclick="showView('list')">← 返回</button>`;
  }
  window.scrollTo(0,0);
}

// ── Render list ───────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  ['all','urgent','expired'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('on', t === tab);
  });
  renderList();
}

function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const typeF  = document.getElementById('type-filter').value;
  const sortBy = document.getElementById('sort-by').value;

  // Stats
  const urgent  = clients.filter(c => { const d=daysDiff(c.endDate); return d!==null&&d>=0&&d<=30; }).length;
  const soon    = clients.filter(c => { const d=daysDiff(c.endDate); return d!==null&&d>30&&d<=60; }).length;
  const expired = clients.filter(c => { const d=daysDiff(c.endDate); return d!==null&&d<0; }).length;
  document.getElementById('stat-total').textContent   = clients.length;
  document.getElementById('stat-urgent').textContent  = urgent;
  document.getElementById('stat-soon').textContent    = soon;
  document.getElementById('stat-expired').textContent = expired;

  let list = clients.filter(c => {
    const matchSearch = !search ||
      (c.name||'').toLowerCase().includes(search) ||
      (c.phone||'').includes(search) ||
      (c.policyNo||'').toLowerCase().includes(search);
    const matchType = typeF === '全部' || c.insType === typeF;
    return matchSearch && matchType;
  });

  if (currentTab === 'urgent') list = list.filter(c => { const d=daysDiff(c.endDate); return d!==null&&d>=0&&d<=60; });
  if (currentTab === 'expired') list = list.filter(c => { const d=daysDiff(c.endDate); return d!==null&&d<0; });

  list.sort((a,b) => sortBy === 'endDate'
    ? (a.endDate||'').localeCompare(b.endDate||'')
    : (a.name||'').localeCompare(b.name||''));

  const el = document.getElementById('client-list');
  if (list.length === 0) {
    el.innerHTML = `<div class="empty">${clients.length===0
      ? '尚無客戶資料<br>點右上角「＋ 新增客戶」開始建立'
      : '找不到符合條件的客戶'}</div>`;
    return;
  }

  el.innerHTML = list.map(c => {
    const d = daysDiff(c.endDate);
    const rc = d!==null&&d<0?'row-er':d!==null&&d<=30?'row-ur':d!==null&&d<=60?'row-so':'';
    const dateHtml = d!==null&&d>=0 ? `<div class="rdate">到期：${esc(c.endDate)}</div>` : '';
    return `
      <div class="row ${rc}" onclick="openDetail('${esc(c.id)}')">
        <div class="av">${esc((c.name||'?').charAt(0))}</div>
        <div class="rm">
          <div class="rn">${esc(c.name)}</div>
          <div class="rmeta">${esc(c.phone)}${c.policyNo?' ｜ '+esc(c.policyNo):''}</div>
        </div>
        <div class="rr">
          <div class="rtype">${esc(c.insType)} · ${esc(c.insCompany||'—')}</div>
          ${badge(d)}
          ${dateHtml}
        </div>
      </div>`;
  }).join('');
}

// ── CRUD ──────────────────────────────────────────────────────────
function openNew() {
  editingId = null;
  document.getElementById('form-title').textContent = '新增客戶資料';
  ['name','phone','idNo','email','address','insCompany','policyNo','premium','startDate','endDate','coverage','note'].forEach(k => {
    document.getElementById('f-'+k).value = '';
  });
  document.getElementById('f-insType').value = '汽車險';
  showView('form');
}

function openEdit(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  editingId = id;
  document.getElementById('form-title').textContent = '編輯客戶資料';
  ['name','phone','idNo','email','address','insType','insCompany','policyNo','premium','startDate','endDate','coverage','note'].forEach(k => {
    document.getElementById('f-'+k).value = c[k] || '';
  });
  showView('form');
}

function saveForm() {
  const name    = document.getElementById('f-name').value.trim();
  const endDate = document.getElementById('f-endDate').value;
  if (!name || !endDate) { alert('請填寫姓名及到期日'); return; }

  const data = {};
  ['name','phone','idNo','email','address','insType','insCompany','policyNo','premium','startDate','endDate','coverage','note'].forEach(k => {
    data[k] = document.getElementById('f-'+k).value.trim();
  });

  if (editingId) {
    clients = clients.map(c => c.id === editingId ? {...data, id: editingId} : c);
    showToast('✅ 已更新');
  } else {
    clients.push({...data, id: Date.now().toString()});
    showToast('✅ 已新增');
  }
  saveData(); renderList(); showView('list');
}

function deleteClient(id) {
  if (!confirm('確定要刪除此筆資料？')) return;
  clients = clients.filter(c => c.id !== id);
  saveData(); renderList(); showView('list');
  showToast('🗑 已刪除');
}

function openDetail(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  const d = daysDiff(c.endDate);

  let alertHtml = '';
  if (d !== null && d < 0)
    alertHtml = `<div class="alert alert-red">⚠️ 此保單已於 ${esc(c.endDate)} 到期，請盡快聯繫客戶續保！</div>`;
  else if (d !== null && d <= 30)
    alertHtml = `<div class="alert alert-orange">🔔 保單將於 ${d} 天後（${esc(c.endDate)}）到期，請儘速安排續保</div>`;
  else if (d !== null && d <= 60)
    alertHtml = `<div class="alert alert-gold">📅 保單將於 ${d} 天後（${esc(c.endDate)}）到期，請提前規劃</div>`;

  const fields = [
    ['電話', c.phone], ['身份證字號', c.idNo],
    ['電子信箱', c.email], ['保單號碼', c.policyNo],
    ['生效日期', c.startDate], ['到期日期', c.endDate],
    ['年度保費', c.premium ? 'NT$ '+Number(c.premium).toLocaleString() : ''],
    ['通訊地址', c.address],
  ];

  document.getElementById('detail-body').innerHTML = `
    ${alertHtml}
    <div class="dhero">
      <div class="dav">${esc((c.name||'?').charAt(0))}</div>
      <div>
        <div class="dname">${esc(c.name)}</div>
        <div class="dtype">${esc(c.insType)} · ${esc(c.insCompany||'—')}</div>
      </div>
      <div style="margin-left:auto">${badge(d)}</div>
    </div>
    <div class="dgrid">
      ${fields.map(([l,v]) => `
        <div>
          <div class="dlabel">${l}</div>
          <div class="dval">${esc(v||'—')}</div>
        </div>`).join('')}
    </div>
    ${c.coverage ? `<div class="dlabel">保障內容</div><div class="dcov">${esc(c.coverage)}</div>` : ''}
    ${c.note ? `<div class="dlabel">備註</div><div class="dnote">${esc(c.note)}</div>` : ''}
    <div class="dactions">
      <button class="btn-edit" onclick="openEdit('${esc(c.id)}')">✏️ 編輯</button>
      <button class="btn-del" onclick="deleteClient('${esc(c.id)}')">刪除</button>
    </div>
  `;
  showView('detail');
}

// ── Backup ────────────────────────────────────────────────────────
function exportJSON() {
  const blob = new Blob([JSON.stringify(clients, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `產險備份_${new Date().toISOString().slice(0,10)}.json`; a.click();
  showToast('✅ 備份檔已下載');
}

function exportCSV() {
  const keys  = ['name','phone','idNo','email','address','insType','insCompany','policyNo','startDate','endDate','premium','coverage','note'];
  const heads = ['姓名','電話','身份證字號','電子信箱','通訊地址','險種','保險公司','保單號碼','生效日期','到期日期','年度保費','保障內容','備註'];
  const rows  = [heads, ...clients.map(c => keys.map(k => `"${(c[k]||'').replace(/"/g,'""')}"`))]
    .map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+rows], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `產險客戶_${new Date().toISOString().slice(0,10)}.csv`; a.click();
  showToast('✅ CSV 已下載');
}

function importJSON(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error();
      if (!confirm(`確定匯入 ${data.length} 筆資料？現有資料會保留。`)) return;
      const map = Object.fromEntries(clients.map(c => [c.id, c]));
      data.forEach(c => { map[c.id || Date.now()+Math.random()] = c; });
      clients = Object.values(map);
      saveData(); renderList();
      showToast(`✅ 已匯入 ${data.length} 筆`);
    } catch { alert('格式錯誤，請選擇正確的 JSON 備份檔'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ── Init ──────────────────────────────────────────────────────────
loadData();
showView('list');
renderList();
</script>
